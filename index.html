<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Website</title>
</head>
<style>

.banner {
  background-image: url(pizza-pizza-filled-with-tomatoes-salami-olives.jpg);
  min-height: 90vh; /* better than auto */
  background-size: cover;
  background-position: center;
  width: 100%;
}

/* Heading */
.heading {
  background-color: rgb(85, 20, 20);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.heading h1 {
  font-size: 28px;
}

.heading p {
  font-size: 14px;
}

/* Navbar */
.navbar{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  background-color: black;
  padding: 10px;
  width: 96.5%;
}

.navbar a {
  text-decoration: none;
  color: white;
  font-size: 18px;
}

/* 🔥 Mobile Responsive */
@media (max-width: 600px) {
  .heading h1 {
    font-size: 22px; /* smaller text */
  }

  .heading p {
    font-size: 12px;
  }

  .navbar {
    flex-direction: column; /* vertical menu */
    align-items: center;
  }

  .navbar a {
    width: 100%;
    text-align: center;
    padding: 10px;
    border-top: 1px solid #444;
  }
}

.btn {
  display:flex;
  justify-content: center;
  align-items: center;
  text-align: center;
   margin:auto;
   margin-top: 60px;
  padding: 12px 25px;
  color: white;
  border: none;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(8px);
  cursor: pointer;
}
/* 🔥 Tablet/Desktop */
@media (min-width: 768px) {
  .heading h1 {
    font-size: 36px;
  }

  .heading p {
    font-size: 16px;
  }
}
/* Menu Section */
.menu {
  text-align: center;
  padding: 20px;
  color: #1f1d1d;
}

.menu h2 {
  font-size: 32px;
  margin-bottom: 30px;
}

/* Cards Container */
.menu-items {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* COMMON CARD STYLE (for all cards) */
.card1, .card2, .card3 {
  flex: 1 1 250px;   /* responsive width */
  max-width: 300px;
  background-color: #fff;
  border-radius: 12px;
  border: 1px solid #ccc;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  padding: 15px;
  text-align: center;
}

/* Images */
.card1 img,
.card2 img,
.card3 img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* Buttons */
.card1 button,
.card2 button,
.card3 button {
  background-color: #ffcc00;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 8px;
}

.card1 button:hover,
.card2 button:hover,
.card3 button:hover {
  background-color: brown;
}
</style>
<body>
 <div class="banner">
  
  <div class="heading">
    <h1>Delicious pizza</h1>
    <p>fresh-Hot-Tasty</p>
    
    <div class="navbar">
      <a href="#">Home</a>
      <a href="#">Menu</a>
      <a href="#">About</a>
      <a href="#">Contactus</a>
    </div>
  </div>
  
  <button class="btn">Best Pizza in Town</button>

</div> 
<section>
    <div class="menu">
      <h2>Our Menu</h2></div>
      <div class="menu-items">
        <div class="card1">
          <img src="download (1).jfif">
          
          <h3>veggie</h3>
          <p>A healthy mix of fresh vegtables and cheese.</p>
          <button>order Now</button>
        </div>

         <div class="card2">
          <img src="download (2).jfif">
          
          <h3>pepperoni</h3>
          <p>Loaded with perimum pepperoni and cheese.</p>
          <button>order Now</button>
        </div>

        
         <div class="card3">
          <img src="download.jfif">
          
          <h3>Margherita</h3>
          <p>Classic  delight with fresh tamatoes and mozzarella.</p>
          <button>order Now</button>
        </div> 
      </div>
    </section>
</body>
</html>
